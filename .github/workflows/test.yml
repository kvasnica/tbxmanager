name: Test MATLAB Client
on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        matlab-release: [R2022b, R2024a]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ matrix.matlab-release }}

      - uses: matlab-actions/run-tests@v2
        with:
          source-folder: .
          test-results-junit: results/test-results.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.matlab-release }}
          path: results/
