name: 'tbxmanager-publish'
description: 'Automatically publish a MATLAB package to the tbxmanager registry'
branding:
  icon: 'package'
  color: 'blue'

inputs:
  registry-token:
    description: 'GitHub token with write access to the registry repo (for creating PRs)'
    required: true
  registry-repo:
    description: 'Registry repository (owner/repo)'
    required: false
    default: 'kvasnica/tbxmanager-registry'
  package-file:
    description: 'Path to tbxmanager.json'
    required: false
    default: 'tbxmanager.json'
  archive-dir:
    description: 'Directory containing pre-built platform archives (for MEX packages)'
    required: false
    default: 'dist'

runs:
  using: 'composite'
  steps:
    - name: Read package metadata
      id: metadata
      shell: bash
      run: |
        PACKAGE_FILE="${{ inputs.package-file }}"
        if [ ! -f "$PACKAGE_FILE" ]; then
          echo "::error::$PACKAGE_FILE not found in repository root"
          exit 1
        fi
        NAME=$(python3 -c "import json; d=json.load(open('$PACKAGE_FILE')); print(d['name'])")
        VERSION=$(python3 -c "import json; d=json.load(open('$PACKAGE_FILE')); print(d['version'])")
        echo "name=$NAME" >> "$GITHUB_OUTPUT"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Publishing $NAME@$VERSION"

    - name: Detect platforms and build archives
      id: archives
      shell: bash
      run: |
        PACKAGE_FILE="${{ inputs.package-file }}"
        ARCHIVE_DIR="${{ inputs.archive-dir }}"
        NAME="${{ steps.metadata.outputs.name }}"
        VERSION="${{ steps.metadata.outputs.version }}"
        TAG="${GITHUB_REF_NAME}"

        # Parse platforms from tbxmanager.json
        PLATFORMS=$(python3 -c "
        import json
        d = json.load(open('$PACKAGE_FILE'))
        for p in d.get('platforms', {}):
            print(p)
        ")

        # Parse exclude patterns from publish config
        EXCLUDES=$(python3 -c "
        import json
        d = json.load(open('$PACKAGE_FILE'))
        pub = d.get('publish', {})
        for pat in pub.get('exclude', ['.git', '.github', 'tests', 'docs', 'tbxmanager.json']):
            print(pat)
        " 2>/dev/null || echo -e ".git\n.github\ntests\ndocs\ntbxmanager.json")

        mkdir -p "$ARCHIVE_DIR"
        SHA256_ARGS=""
        URL_ARGS=""

        for PLATFORM in $PLATFORMS; do
          ARCHIVE="${NAME}-${PLATFORM}.zip"
          ARCHIVE_PATH="${ARCHIVE_DIR}/${ARCHIVE}"

          if [ "$PLATFORM" = "all" ] && [ ! -f "$ARCHIVE_PATH" ]; then
            # Auto-build archive for pure MATLAB packages
            echo "Building archive for platform 'all'..."
            EXCLUDE_FLAGS=""
            while IFS= read -r pattern; do
              [ -n "$pattern" ] && EXCLUDE_FLAGS="$EXCLUDE_FLAGS -x '${pattern}/*'"
            done <<< "$EXCLUDES"
            eval zip -r "$ARCHIVE_PATH" . $EXCLUDE_FLAGS -x '${ARCHIVE_DIR}/*'
          fi

          if [ ! -f "$ARCHIVE_PATH" ]; then
            echo "::error::Archive not found: $ARCHIVE_PATH (pre-build platform-specific archives in $ARCHIVE_DIR/)"
            exit 1
          fi

          # Compute SHA256
          SHA=$(shasum -a 256 "$ARCHIVE_PATH" | cut -d' ' -f1)
          echo "  $PLATFORM: sha256=$SHA"
          SHA256_ARGS="$SHA256_ARGS --sha256 ${PLATFORM}=${SHA}"

          # Upload to release and compute URL
          REPO="${GITHUB_REPOSITORY}"
          RELEASE_URL="https://github.com/${REPO}/releases/download/${TAG}/${ARCHIVE}"
          URL_ARGS="$URL_ARGS --url ${PLATFORM}=${RELEASE_URL}"

          # Upload to the release
          gh release upload "$TAG" "$ARCHIVE_PATH" --clobber
        done

        echo "sha256_args=$SHA256_ARGS" >> "$GITHUB_OUTPUT"
        echo "url_args=$URL_ARGS" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Convert to registry format
      id: convert
      shell: bash
      run: |
        NAME="${{ steps.metadata.outputs.name }}"
        VERSION="${{ steps.metadata.outputs.version }}"
        REGISTRY_REPO="${{ inputs.registry-repo }}"

        # Clone registry to check for existing entry
        git clone --depth 1 "https://x-access-token:${{ inputs.registry-token }}@github.com/${REGISTRY_REPO}.git" /tmp/registry

        EXISTING_FLAG=""
        EXISTING_PATH="/tmp/registry/packages/${NAME}/package.json"
        if [ -f "$EXISTING_PATH" ]; then
          EXISTING_FLAG="--existing $EXISTING_PATH"
          echo "is_new=false" >> "$GITHUB_OUTPUT"
        else
          echo "is_new=true" >> "$GITHUB_OUTPUT"
        fi

        # Download converter script from tbxmanager repo
        CONVERTER_URL="https://raw.githubusercontent.com/kvasnica/tbxmanager/master/scripts/convert_to_registry.py"
        curl -sL "$CONVERTER_URL" -o /tmp/convert_to_registry.py

        mkdir -p "/tmp/registry/packages/${NAME}"
        OUTPUT="/tmp/registry/packages/${NAME}/package.json"

        python3 /tmp/convert_to_registry.py \
          --input "${{ inputs.package-file }}" \
          --output "$OUTPUT" \
          $EXISTING_FLAG \
          ${{ steps.archives.outputs.sha256_args }} \
          ${{ steps.archives.outputs.url_args }} \
          --released "$(date +%Y-%m-%d)"

        echo "output_path=$OUTPUT" >> "$GITHUB_OUTPUT"

    - name: Open PR to registry
      shell: bash
      run: |
        NAME="${{ steps.metadata.outputs.name }}"
        VERSION="${{ steps.metadata.outputs.version }}"
        REGISTRY_REPO="${{ inputs.registry-repo }}"
        IS_NEW="${{ steps.convert.outputs.is_new }}"
        BRANCH="publish/${NAME}/${VERSION}"
        REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

        cd /tmp/registry

        git config user.name "tbxmanager-publish"
        git config user.email "tbxmanager-publish[bot]@users.noreply.github.com"

        git checkout -b "$BRANCH"
        git add "packages/${NAME}/package.json"
        git commit -m "publish: ${NAME}@${VERSION}

        Automated submission from ${REPO_URL}
        Release: ${GITHUB_REF_NAME}"

        git push origin "$BRANCH"

        if [ "$IS_NEW" = "true" ]; then
          TITLE="New package: ${NAME}@${VERSION}"
          LABEL="new-package"
        else
          TITLE="Update: ${NAME}@${VERSION}"
          LABEL="package-update"
        fi

        gh pr create \
          --repo "$REGISTRY_REPO" \
          --head "$BRANCH" \
          --title "$TITLE" \
          --body "## Automated Package Submission

        **Package:** \`${NAME}\`
        **Version:** \`${VERSION}\`
        **Source:** [${GITHUB_REPOSITORY}](${REPO_URL})
        **Release:** [${GITHUB_REF_NAME}](${REPO_URL}/releases/tag/${GITHUB_REF_NAME})

        ---
        *Submitted automatically by [tbxmanager-publish](https://github.com/kvasnica/tbxmanager-publish)*" \
          --label "automated,$LABEL"
      env:
        GH_TOKEN: ${{ inputs.registry-token }}
